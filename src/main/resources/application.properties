# --- DATABASE CONFIG ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${POSTGRES_USER}
spring.jpa.open-in-view=false

# --- DATABASE MIGRATION CONFIG ---
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations

# --- LOGGING CONFIG ---
logging.level.org.hibernate.orm.connections.pooling=ERROR

# --- SERVER CONFIG ---
server.port=${PORT:8080}
spring.application.name=@project.name@
spring.application.version=@project.version@
