name: franchising_management_system_http-server

services:
  postgres:
    image: postgres:18-alpine
    container_name: franchising_management_system_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - 5432:5432
    volumes:
      - ./postgres/var/lib/postgresql/data:/var/lib/postgresql/data
    networks:
      - franchising_management_system_http-server-network

  franchising_management_system-http-server:
    image: franchising_management_system_http-server
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: franchising_management_system_http-server
    environment:
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    networks:
      - franchising_management_system_http-server-network

networks:
  franchising_management_system_http-server-network:
    driver: bridge
